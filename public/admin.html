<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSI 관리자 대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

    /* 사이드바 */
    .sidebar {
      width: 300px;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-header .logo { font-size: 1.2rem; font-weight: 700; }
    .sidebar-header .logo span { color: #e94560; }
    .sidebar-header .badge {
      background: #e94560;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list-title {
      padding: 14px 20px 8px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .conv-item {
      padding: 14px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }
    .conv-item:hover { background: rgba(255,255,255,0.05); }
    .conv-item.active { background: rgba(233,69,96,0.15); border-left-color: #e94560; }
    .conv-item .conv-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .conv-item .conv-preview {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-item .conv-time { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 4px; }

    .empty-conv {
      padding: 40px 20px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
    }

    /* 메인 채팅 영역 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      background: #0f3460;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .chat-header-info .name { font-weight: 600; font-size: 0.95rem; }
    .chat-header-info .sub { font-size: 0.78rem; color: #999; }
    .header-actions { margin-left: auto; }
    .refresh-btn {
      background: #f0f2f5;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      color: #555;
    }
    .refresh-btn:hover { background: #e4e6e9; }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fa;
    }

    .msg {
      max-width: 70%;
      padding: 11px 16px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .msg.visitor {
      background: white;
      color: #1a1a2e;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-bottom-left-radius: 4px;
    }
    .msg.admin {
      background: #0f3460;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-meta {
      font-size: 0.72rem;
      color: #999;
      margin-top: 3px;
    }
    .msg.admin + .msg-meta { text-align: right; }

    .input-area {
      background: white;
      padding: 16px 24px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area textarea {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      height: 44px;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-area textarea:focus { border-color: #0f3460; }
    .send-btn {
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .send-btn:hover { background: #0a2744; }

    /* 빈 상태 */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #bbb;
    }
    .empty-state .icon { font-size: 3rem; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- 사이드바: 문의 목록 -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">Open<span>SI</span> Admin</div>
    <div class="badge" id="conv-count">0</div>
  </div>
  <div class="conv-list-title">문의 목록</div>
  <div class="conv-list" id="conv-list">
    <div class="empty-conv">아직 문의가 없습니다</div>
  </div>
</div>

<!-- 메인 영역 -->
<div class="main" id="main">
  <div class="empty-state">
    <div class="icon">💬</div>
    <p>왼쪽에서 문의를 선택하세요</p>
  </div>
</div>

<script>
  const BACKEND = '__BACKEND_URL__';
  const WS_BACKEND = BACKEND.replace('http', 'ws');

  let currentConvId = null;
  let ws = null;
  let conversations = [];

  // 관리자 WebSocket 연결
  function connectAdminWS() {
    ws = new WebSocket(`${WS_BACKEND}?type=admin`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'message') {
        // 문의 목록 갱신
        loadConversations();
        // 현재 열린 대화면 메시지 추가
        if (msg.conversationId === currentConvId && msg.sender === 'visitor') {
          appendMessage('visitor', msg.content, msg.createdAt);
        }
      }
    };
    ws.onclose = () => setTimeout(connectAdminWS, 3000); // 재연결
  }

  async function loadConversations() {
    const res = await fetch(`${BACKEND}/api/conversations`);
    conversations = await res.json();
    renderConvList();
  }

  function renderConvList() {
    const list = document.getElementById('conv-list');
    document.getElementById('conv-count').textContent = conversations.length;

    if (conversations.length === 0) {
      list.innerHTML = '<div class="empty-conv">아직 문의가 없습니다</div>';
      return;
    }

    list.innerHTML = conversations.map(c => `
      <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="openConversation('${c.id}', '${c.visitor_name || '익명'}')">
        <div class="conv-name">${escHtml(c.visitor_name || '익명')}</div>
        <div class="conv-preview">${escHtml(c.last_message || '(메시지 없음)')}</div>
        <div class="conv-time">${c.last_message_at ? timeAgo(c.last_message_at) : ''} · ${c.message_count || 0}개</div>
      </div>
    `).join('');
  }

  async function openConversation(id, name) {
    currentConvId = id;
    renderConvList();

    // 메인 영역 구성
    document.getElementById('main').innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${name[0] || '?'}</div>
        <div class="chat-header-info">
          <div class="name">${escHtml(name)}</div>
          <div class="sub">대화 ID: ${id.slice(0,8)}...</div>
        </div>
        <div class="header-actions">
          <button class="refresh-btn" onclick="openConversation('${id}', '${name}')">↻ 새로고침</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <textarea id="admin-input" placeholder="답변을 입력하세요..." onkeydown="handleAdminKey(event)"></textarea>
        <button class="send-btn" onclick="sendAdminMessage()">전송</button>
      </div>
    `;

    // 메시지 불러오기
    const res = await fetch(`${BACKEND}/api/conversations/${id}/messages`);
    const messages = await res.json();
    messages.forEach(m => appendMessage(m.sender, m.content, m.created_at));
  }

  function appendMessage(sender, content, time) {
    const area = document.getElementById('messages-area');
    if (!area) return;

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = sender === 'admin' ? 'flex-end' : 'flex-start';

    const msg = document.createElement('div');
    msg.className = `msg ${sender}`;
    msg.textContent = content;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `${sender === 'admin' ? '관리자' : '방문자'} · ${time ? new Date(time).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) : ''}`;

    wrapper.appendChild(msg);
    wrapper.appendChild(meta);
    area.appendChild(wrapper);
    area.scrollTop = area.scrollHeight;
  }

  function handleAdminKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendAdminMessage();
    }
  }

  function sendAdminMessage() {
    const input = document.getElementById('admin-input');
    const content = input.value.trim();
    if (!content || !currentConvId || !ws) return;

    ws.send(JSON.stringify({ type: 'message', conversationId: currentConvId, sender: 'admin', content }));
    appendMessage('admin', content, new Date());
    input.value = '';
  }

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;
  }

  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 초기화
  connectAdminWS();
  loadConversations();
  setInterval(loadConversations, 10000); // 10초마다 갱신
</script>
</body>
</html>
