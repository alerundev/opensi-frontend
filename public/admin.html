<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSI 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0e0e10;
      --bg2: #141416;
      --bg3: #1c1c1f;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8ea;
      --text-muted: #8b8b8f;
      --accent: #5e6ad2;
      --accent-hover: #6e7ae2;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* 사이드바 */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .sidebar-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-logo {
      font-size: 0.95rem;
      font-weight: 700;
      background: linear-gradient(135deg, #5e6ad2, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .count-badge {
      background: rgba(94,106,210,0.15);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .sidebar-section-label {
      padding: 12px 18px 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      padding: 12px 18px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.15s;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active {
      background: rgba(94,106,210,0.08);
      border-left-color: var(--accent);
    }
    .conv-name { font-size: 0.85rem; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .conv-preview {
      font-size: 0.76rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .conv-time { font-size: 0.7rem; color: var(--text-muted); }
    .conv-count-sm {
      font-size: 0.7rem;
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 8px;
      color: var(--text-muted);
    }
    .empty-state-side {
      padding: 32px 18px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    /* 메인 */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-topbar {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
    }
    .topbar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5e6ad2, #9b59b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .topbar-info .name { font-size: 0.88rem; font-weight: 600; }
    .topbar-info .sub { font-size: 0.72rem; color: var(--text-muted); }
    .topbar-actions { margin-left: auto; }
    .topbar-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .topbar-btn:hover { color: var(--text); }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row { display: flex; flex-direction: column; }
    .msg-row.admin { align-items: flex-end; }
    .msg-row.visitor { align-items: flex-start; }

    .msg {
      max-width: 68%;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.55;
    }
    .msg-row.visitor .msg {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }
    .msg-row.admin .msg {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 3px;
    }
    .msg-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 2px;
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
    }
    .input-area textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      resize: none;
      height: 40px;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    /* 빈 상태 */
    .empty-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
    }
    .empty-main .icon { font-size: 2.5rem; opacity: 0.3; }
    .empty-main p { font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">OpenSI Admin</div>
    <div class="count-badge" id="conv-count">0</div>
  </div>
  <div class="sidebar-section-label">문의 목록</div>
  <div class="conv-list" id="conv-list">
    <div class="empty-state-side">아직 문의가 없어요</div>
  </div>
</div>

<div class="main" id="main">
  <div class="empty-main">
    <div class="icon">💬</div>
    <p>문의를 선택해 대화를 시작하세요</p>
  </div>
</div>

<script>
  const BACKEND = '__BACKEND_URL__';
  const WS_BACKEND = BACKEND.replace('https', 'wss').replace('http', 'ws');

  let currentConvId = null;
  let ws = null;
  let conversations = [];

  function connectAdminWS() {
    ws = new WebSocket(`${WS_BACKEND}?type=admin`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'message') {
        loadConversations();
        if (msg.conversationId === currentConvId && msg.sender === 'visitor') {
          appendMessage('visitor', msg.content, msg.createdAt);
        }
      }
    };
    ws.onclose = () => setTimeout(connectAdminWS, 3000);
  }

  async function loadConversations() {
    const res = await fetch(`${BACKEND}/api/conversations`);
    conversations = await res.json();
    renderConvList();
  }

  function renderConvList() {
    const list = document.getElementById('conv-list');
    document.getElementById('conv-count').textContent = conversations.length;
    if (conversations.length === 0) {
      list.innerHTML = '<div class="empty-state-side">아직 문의가 없어요</div>';
      return;
    }
    list.innerHTML = conversations.map(c => `
      <div class="conv-item ${c.id === currentConvId ? 'active' : ''}"
           onclick="openConversation('${c.id}', '${esc(c.visitor_name || '익명')}')">
        <div class="conv-name">${esc(c.visitor_name || '익명')}</div>
        <div class="conv-preview">${esc(c.last_message || '메시지 없음')}</div>
        <div class="conv-meta">
          <span class="conv-time">${c.last_message_at ? timeAgo(c.last_message_at) : ''}</span>
          <span class="conv-count-sm">${c.message_count || 0}개</span>
        </div>
      </div>
    `).join('');
  }

  async function openConversation(id, name) {
    currentConvId = id;
    renderConvList();

    document.getElementById('main').innerHTML = `
      <div class="chat-topbar">
        <div class="topbar-avatar">${name[0] || '?'}</div>
        <div class="topbar-info">
          <div class="name">${esc(name)}</div>
          <div class="sub">${id.slice(0,8)}...</div>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" onclick="openConversation('${id}','${esc(name)}')">↻</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <textarea id="admin-input" placeholder="답변 입력..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendAdminMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    `;

    const res = await fetch(`${BACKEND}/api/conversations/${id}/messages`);
    const msgs = await res.json();
    msgs.forEach(m => appendMessage(m.sender, m.content, m.created_at));
  }

  function appendMessage(sender, content, time) {
    const area = document.getElementById('messages-area');
    if (!area) return;
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = content;
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = time ? new Date(time).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) : '';
    row.appendChild(msg);
    row.appendChild(t);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAdminMessage(); }
  }

  function sendAdminMessage() {
    const input = document.getElementById('admin-input');
    const content = input.value.trim();
    if (!content || !currentConvId || !ws) return;
    ws.send(JSON.stringify({ type: 'message', conversationId: currentConvId, sender: 'admin', content }));
    appendMessage('admin', content, new Date());
    input.value = '';
  }

  function timeAgo(d) {
    const diff = (Date.now() - new Date(d)) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  connectAdminWS();
  loadConversations();
  setInterval(loadConversations, 10000);
</script>
</body>
</html>
